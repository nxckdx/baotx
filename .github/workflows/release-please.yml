name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: google-github-actions/release-please-action@v4
        id: release
        # The configuration is now primarily in release-please-config.json

      # This step runs ONLY when a new release is actually created
      - name: Prepare and Upload Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          VERSION_TO_SET="${TAG_NAME#v}"
          
          echo "Preparing asset for release $TAG_NAME (Version: $VERSION_TO_SET)"
          
          # The file should already be updated by release-please in the merged PR,
          # but we keep this as a secondary safety measure for the uploaded asset.
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION_TO_SET\"/" baotx
          
          # Verify the version in the asset
          grep "^VERSION=" baotx
          
          # Upload the script as a release asset
          gh release upload "$TAG_NAME" baotx --clobber
