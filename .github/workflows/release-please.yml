name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: baotx

      # Step 3: Sync version in the Pull Request branch
      - name: Sync version to baotx PR
        if: ${{ steps.release.outputs.pr }}
        run: |
          PR_BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r .headBranchName)
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH
          
          # Use the version output from release-please
          VERSION="${{ steps.release.outputs.version }}"
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            sed -i "s/^VERSION=.*/VERSION=\"$VERSION\"/" baotx
            
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add baotx
            git commit -m "chore: sync version to baotx" || echo "No changes to commit"
            git push origin $PR_BRANCH
          fi

      # Step 4: Ensure the uploaded asset has the correct version
      - name: Upload Release Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the version output from release-please
          VERSION="${{ steps.release.outputs.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
            # Fallback to tag name if version is not set
            TAG_NAME="${{ steps.release.outputs.tag_name }}"
            VERSION="${TAG_NAME#v}"
          fi
          
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION\"/" baotx
          gh release upload "${{ steps.release.outputs.tag_name }}" baotx --clobber
