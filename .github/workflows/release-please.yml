name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          # The action will automatically find release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Upload the asset when a release is created
      - name: Upload Release Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The file 'baotx' was already updated by the bot before the release
          gh release upload "${{ steps.release.outputs.tag_name }}" baotx --clobber
