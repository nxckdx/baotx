name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          version-file: VERSION
          package-name: baotx

      # This step runs ONLY when a new release is actually created
      - name: Prepare and Upload Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the version from the tag (the most reliable source)
          # Example: tag_name is v1.0.6 -> VERSION_TO_SET is 1.0.6
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          VERSION_TO_SET="${TAG_NAME#v}"
          
          echo "Preparing asset for release $TAG_NAME (Version: $VERSION_TO_SET)"
          
          # 2. Force-patch the version into the baotx script
          # We use a very specific sed to find the VERSION= line
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION_TO_SET\"/" baotx
          
          # 3. Verify it worked (for the logs)
          grep "^VERSION=" baotx
          
          # 4. Upload to the release (clobber replaces if already exists)
          gh release upload "$TAG_NAME" baotx --clobber
