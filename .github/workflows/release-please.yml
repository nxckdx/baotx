name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: baotx

      # Step 3: Sync version in the Pull Request branch
      - name: Sync version to baotx PR
        if: ${{ steps.release.outputs.pr }}
        run: |
          PR_BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r .headBranchName)
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH
          git pull origin $PR_BRANCH --rebase
          
          # Get version from the PR title or package.json
          VERSION=$(jq -r .version package.json)
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION\"/" baotx
          
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add baotx
          git commit -m "chore: sync version to baotx" || echo "No changes to commit"
          git push origin $PR_BRANCH

      # Step 4: Final sync and asset upload when release is created
      - name: Upload Release Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the actual tag name as the source of truth
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          # Strip the 'v' prefix to get the version number (v1.0.2 -> 1.0.2)
          VERSION_NAME="${TAG_NAME#v}"
          
          # Force update the version in the file before uploading
          sed -i "s/^VERSION=.*/VERSION=\"$VERSION_NAME\"/" baotx
          
          # Upload the patched file as a release asset
          gh release upload "$TAG_NAME" baotx --clobber
