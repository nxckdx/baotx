name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: google-github-actions/release-please-action@v4
        id: release

      - name: Update baotx in repo and upload asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          VERSION_TO_SET="${TAG_NAME#v}"

          echo "Syncing baotx to version $VERSION_TO_SET..."

          sed -i "s/^VERSION=.*/VERSION=\"$VERSION_TO_SET\"/" baotx

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baotx
          git commit -m "chore: update version in baotx to $VERSION_TO_SET [skip ci]"
          git push origin main

          gh release upload "$TAG_NAME" baotx --clobber
