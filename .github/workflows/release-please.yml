name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          # This specifies the strategy for a simple script-based project
          release-type: simple
          # We tell the bot to look for a version in the 'baotx' file
          extra-files: |
            baotx
